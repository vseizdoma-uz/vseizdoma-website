name: Notify Telegram on Pages Deploy

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secrets
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID secret is missing"
            exit 1
          fi

      - name: Collect deploy info
        id: info
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          WR_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SHA=$(gh api "repos/${REPO}/commits/main" --jq '.sha')
            CONCLUSION="success"
          else
            SHA="$WR_SHA"
            CONCLUSION="$WR_CONCLUSION"
            if [ "$WR_BRANCH" != "main" ]; then
              echo "Skipping: branch $WR_BRANCH is not main"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          DATA=$(gh api "repos/${REPO}/commits/${SHA}")
          AUTHOR=$(echo "$DATA" | jq -r '.commit.author.name')
          MSG=$(echo "$DATA" | jq -r '.commit.message' | head -n 1)
          SHORT_SHA=${SHA:0:7}

          {
            echo "skip=false"
            echo "conclusion=$CONCLUSION"
            echo "short_sha=$SHORT_SHA"
            echo "author<<EOF"
            echo "$AUTHOR"
            echo "EOF"
            echo "msg<<EOF"
            echo "$MSG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram notification
        if: steps.info.outputs.skip != 'true'
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CONCLUSION: ${{ steps.info.outputs.conclusion }}
          AUTHOR: ${{ steps.info.outputs.author }}
          MSG: ${{ steps.info.outputs.msg }}
          SHORT_SHA: ${{ steps.info.outputs.short_sha }}
        run: |
          html_escape() { python3 -c "import html,sys; print(html.escape(sys.stdin.read()), end='')"; }
          AUTHOR_ESC=$(printf '%s' "$AUTHOR" | html_escape)
          MSG_ESC=$(printf '%s' "$MSG" | html_escape)
          if [ "$CONCLUSION" = "success" ]; then
            TEXT=$(printf '🟢 Сайт vseizdoma.store задеплоен\nКоммит <code>%s</code> by %s\n%s' "$SHORT_SHA" "$AUTHOR_ESC" "$MSG_ESC")
          else
            TEXT=$(printf '🔴 Pages деплой упал (%s)\nКоммит <code>%s</code> by %s\n%s' "$CONCLUSION" "$SHORT_SHA" "$AUTHOR_ESC" "$MSG_ESC")
          fi
          curl -sS -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}" \
            --fail-with-body
