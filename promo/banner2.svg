<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7DC6F"/>
      <stop offset="30%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00CED1"/>
      <stop offset="100%" stop-color="#20B2AA"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg2)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#FFD700" opacity="0.03"/>
  <circle cx="980" cy="980" r="250" fill="#00CED1" opacity="0.03"/>
  <circle cx="900" cy="150" r="150" fill="#FFD700" opacity="0.02"/>

  <!-- Top badge -->
  <rect x="290" y="60" width="500" height="60" rx="30" fill="url(#teal)" opacity="0.9"/>
  <text x="540" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="30" fill="#FFFFFF">СКУПКА ПО ВСЕМУ ТАШКЕНТУ</text>

  <!-- КУПЛЮ -->
  <text x="540" y="270" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="155" fill="url(#gold2)" filter="url(#glow2)">КУПЛЮ</text>

  <!-- ДОРОГО -->
  <text x="540" y="420" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="155" fill="url(#gold2)" filter="url(#glow2)">ДОРОГО</text>

  <!-- Feature boxes -->
  <rect x="80" y="470" width="280" height="70" rx="10" fill="#FFFFFF" opacity="0.08"/>
  <text x="220" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="#00CED1">&#x2713; Мебель Б/У</text>

  <rect x="400" y="470" width="280" height="70" rx="10" fill="#FFFFFF" opacity="0.08"/>
  <text x="540" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="#00CED1">&#x2713; Бытовая Техника</text>

  <rect x="720" y="470" width="280" height="70" rx="10" fill="#FFFFFF" opacity="0.08"/>
  <text x="860" y="515" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="28" fill="#00CED1">&#x2713; Выезд На Дом</text>

  <!-- Быстро, Надёжно, Честно -->
  <text x="540" y="620" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="65" fill="#FFFFFF" opacity="0.95">Быстро, Надёжно, Честно</text>

  <!-- Divider -->
  <rect x="140" y="660" width="800" height="2" fill="url(#gold2)" opacity="0.5"/>

  <!-- НАРИМАН -->
  <text x="540" y="790" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="115" fill="#FFFFFF">НАРИМАН</text>

  <!-- Phone with icon-like styling -->
  <rect x="200" y="830" width="680" height="110" rx="15" fill="#FFD700" opacity="0.1"/>
  <rect x="200" y="830" width="680" height="110" rx="15" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <text x="540" y="906" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="90" fill="#FFFFFF">(99) 111-23-23</text>

  <!-- Website -->
  <rect x="340" y="970" width="400" height="50" rx="25" fill="url(#teal)" opacity="0.85"/>
  <text x="540" y="1004" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="30" fill="#FFFFFF">vseizdoma.store</text>
</svg>