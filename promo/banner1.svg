<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#FFD700" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg1)"/>

  <!-- Decorative gold line top -->
  <rect x="40" y="40" width="1000" height="3" fill="url(#gold1)" opacity="0.8"/>
  <rect x="40" y="50" width="1000" height="1" fill="#FFD700" opacity="0.4"/>

  <!-- Decorative gold line bottom -->
  <rect x="40" y="1037" width="1000" height="3" fill="url(#gold1)" opacity="0.8"/>
  <rect x="40" y="1029" width="1000" height="1" fill="#FFD700" opacity="0.4"/>

  <!-- Corner accents -->
  <rect x="40" y="40" width="80" height="3" fill="#FFD700"/>
  <rect x="40" y="40" width="3" height="80" fill="#FFD700"/>
  <rect x="957" y="40" width="83" height="3" fill="#FFD700"/>
  <rect x="1037" y="40" width="3" height="80" fill="#FFD700"/>
  <rect x="40" y="1037" width="80" height="3" fill="#FFD700"/>
  <rect x="40" y="957" width="3" height="83" fill="#FFD700"/>
  <rect x="957" y="1037" width="83" height="3" fill="#FFD700"/>
  <rect x="1037" y="957" width="3" height="83" fill="#FFD700"/>

  <!-- КУПЛЮ -->
  <text x="540" y="230" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="148" fill="url(#gold1)" filter="url(#shadow1)">КУПЛЮ</text>

  <!-- ДОРОГО -->
  <text x="540" y="390" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="148" fill="url(#gold1)" filter="url(#shadow1)">ДОРОГО</text>

  <!-- Divider line -->
  <rect x="200" y="430" width="680" height="2" fill="#FFD700" opacity="0.6"/>

  <!-- Быстро, Надёжно -->
  <text x="540" y="520" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="72" fill="#FFFFFF" opacity="0.95">Быстро, Надёжно</text>

  <!-- Б/У Мебель и Технику -->
  <text x="540" y="620" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="52" fill="#FFD700" opacity="0.85">Б/У МЕБЕЛЬ И ТЕХНИКУ</text>

  <!-- Divider -->
  <rect x="300" y="660" width="480" height="1" fill="#FFFFFF" opacity="0.3"/>

  <!-- НАРИМАН -->
  <text x="540" y="780" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="120" fill="#FFFFFF">НАРИМАН</text>

  <!-- Phone -->
  <text x="540" y="910" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="105" fill="#FFFFFF">(99) 111-23-23</text>

  <!-- Website -->
  <text x="540" y="990" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="38" fill="#FFD700" opacity="0.9">vseizdoma.store</text>
</svg>